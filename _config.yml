# GitHub Pages / Jekyll configuration for ASI:BUILD
title: "ASI:BUILD"
description: "A modular Python research framework for AI consciousness, cognitive architectures, and multi-agent reasoning."
url: "https://web3guru888.github.io"
baseurl: "/asi-build"

# Use a built-in GitHub Pages theme (no remote_theme plugin needed)
theme: jekyll-theme-cayman

# GitHub info
show_downloads: true

# SEO
author: "ASI:BUILD Contributors"

# Markdown
markdown: kramdown
kramdown:
  syntax_highlighter: rouge

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - "*.gemspec"
  - node_modules
  - vendor
  - .bundle
  - src/
  - tests/
  - archive/
  - asi-code/
  - branding/
  - configs/
  - examples/
  - pyproject.toml
  - Makefile
  - Dockerfile
  - CLAUDE.md
