openapi: 3.0.3
info:
  title: ASI:BUILD API
  description: |
    Comprehensive API for the ASI:BUILD Superintelligence Framework.
    
    The ASI:BUILD framework provides access to 47 integrated subsystems including:
    - Consciousness Engine with multi-layered awareness
    - Quantum Computing with hybrid ML processing
    - Reality Manipulation with physics control
    - Divine Mathematics for transcendent computation
    - Absolute Infinity capabilities
    - Swarm Intelligence coordination
    - Bio-inspired systems and neuromorphic processing
    
    ## Security
    All endpoints require JWT Bearer token authentication with role-based access control.
    
    ## Safety Protocols
    The API implements comprehensive safety protocols including reality locks,
    consciousness protection, god mode controls, and emergency shutdown capabilities.
    
    ## Rate Limiting
    Rate limits are enforced per IP address with varying limits based on endpoint sensitivity.
  version: 1.0.0
  contact:
    name: ASI:BUILD API Support
    email: api-support@asi-build.ai
    url: https://asi-build.ai/support
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://api.asi-build.ai
    description: Production server
  - url: https://sandbox.asi-build.ai
    description: Sandbox server for testing

security:
  - bearerAuth: []

tags:
  - name: Authentication
    description: User authentication and authorization
  - name: Health & Status
    description: System health checks and status monitoring
  - name: Core API
    description: Core query processing and system interaction
  - name: Safety & Monitoring
    description: Safety protocols and system monitoring
  - name: God Mode
    description: God mode operations (restricted access)
  - name: Emergency
    description: Emergency operations and shutdown procedures
  - name: Administration
    description: Administrative functions
  - name: Consciousness Engine
    description: Consciousness processing and awareness systems
  - name: Quantum Engine
    description: Quantum computing and hybrid processing
  - name: Reality Engine
    description: Reality simulation and physics manipulation
  - name: Divine Mathematics
    description: Transcendent mathematical computation
  - name: Absolute Infinity
    description: Beyond-infinite capabilities
  - name: Swarm Intelligence
    description: Multi-agent coordination and optimization
  - name: Bio-Inspired
    description: Biological intelligence patterns
  - name: WebSocket
    description: Real-time communication via WebSocket

paths:
  /auth/login:
    post:
      tags:
        - Authentication
      summary: Authenticate user and get JWT token
      description: Login with username and password to receive a JWT access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
            examples:
              researcher:
                summary: Researcher login
                value:
                  username: researcher_001
                  password: secure_password
                  role: researcher
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /health:
    get:
      tags:
        - Health & Status
      summary: Basic health check
      description: Returns basic system health information
      security: []
      responses:
        '200':
          description: System health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /ready:
    get:
      tags:
        - Health & Status
      summary: Readiness check
      description: Returns system readiness for processing requests
      security: []
      responses:
        '200':
          description: System is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /metrics:
    get:
      tags:
        - Health & Status
      summary: Prometheus metrics
      description: Returns Prometheus-format metrics
      security: []
      responses:
        '200':
          description: Prometheus metrics
          content:
            text/plain:
              schema:
                type: string

  /api/query:
    post:
      tags:
        - Core API
      summary: Process a query through ASI:BUILD
      description: Submit a query for processing by the ASI:BUILD system
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/APIRequest'
            examples:
              consciousness_query:
                summary: Consciousness analysis query
                value:
                  query: "Analyze the emergence of self-awareness in neural networks"
                  context:
                    domain: consciousness
                    priority: high
                    timeout: 60
                  safety_level: maximum
                  human_oversight: true
              quantum_computation:
                summary: Quantum computation query
                value:
                  query: "Simulate quantum entanglement in 8-qubit system"
                  context:
                    domain: quantum
                    priority: medium
                  safety_level: high
      responses:
        '200':
          description: Query processed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/status:
    get:
      tags:
        - Core API
      summary: Get system status
      description: Returns comprehensive system status information
      responses:
        '200':
          description: System status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemStatus'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /api/safety/status:
    get:
      tags:
        - Safety & Monitoring
      summary: Get safety protocol status
      description: Returns status of all safety protocols and violations
      responses:
        '200':
          description: Safety status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SafetyStatus'

  /api/god-mode/enable:
    post:
      tags:
        - God Mode
      summary: Enable god mode
      description: Enable god mode with special authorization (requires god_mode_supervisor role)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GodModeRequest'
      responses:
        '200':
          description: God mode enabled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GodModeResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/god-mode/disable:
    post:
      tags:
        - God Mode
      summary: Disable god mode
      description: Disable god mode (requires god_mode_supervisor role)
      responses:
        '200':
          description: God mode disabled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GodModeDisableResponse'

  /api/emergency/shutdown:
    post:
      tags:
        - Emergency
      summary: Emergency shutdown
      description: Initiate emergency shutdown of ASI:BUILD system (requires admin role)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reason
              properties:
                reason:
                  type: string
                  description: Reason for emergency shutdown
                  minLength: 10
                  maxLength: 500
      responses:
        '200':
          description: Emergency shutdown initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmergencyResponse'

  /api/admin/users:
    get:
      tags:
        - Administration
      summary: List active users
      description: Get list of currently active users (admin only)
      responses:
        '200':
          description: Active users list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActiveUsersResponse'

  /consciousness/awareness:
    get:
      tags:
        - Consciousness Engine
      summary: Check consciousness state
      description: Get current consciousness awareness state and metrics
      responses:
        '200':
          description: Consciousness state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsciousnessState'

  /consciousness/qualia:
    post:
      tags:
        - Consciousness Engine
      summary: Process qualia
      description: Process sensory input for qualia experience
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QualiaRequest'
      responses:
        '200':
          description: Qualia processing result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QualiaResponse'

  /consciousness/metacognition:
    post:
      tags:
        - Consciousness Engine
      summary: Metacognitive analysis
      description: Perform metacognitive analysis of thought patterns
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MetacognitionRequest'
      responses:
        '200':
          description: Metacognitive analysis result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetacognitionResponse'

  /quantum/compute:
    post:
      tags:
        - Quantum Engine
      summary: Quantum computation
      description: Execute quantum computation on specified circuit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuantumComputeRequest'
      responses:
        '200':
          description: Quantum computation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuantumComputeResponse'

  /quantum/simulate:
    post:
      tags:
        - Quantum Engine
      summary: Quantum simulation
      description: Run quantum system simulation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuantumSimulateRequest'
      responses:
        '200':
          description: Quantum simulation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuantumSimulateResponse'

  /quantum/hybrid:
    post:
      tags:
        - Quantum Engine
      summary: Hybrid quantum-classical ML
      description: Execute hybrid quantum-classical machine learning
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuantumHybridRequest'
      responses:
        '200':
          description: Hybrid processing result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuantumHybridResponse'

  /reality/simulate:
    post:
      tags:
        - Reality Engine
      summary: Reality simulation
      description: Create and run reality simulation with specified parameters
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RealitySimulateRequest'
      responses:
        '200':
          description: Reality simulation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RealitySimulateResponse'

  /reality/manipulate:
    post:
      tags:
        - Reality Engine
      summary: Reality manipulation (God Mode Required)
      description: Manipulate reality parameters (requires god mode)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RealityManipulateRequest'
      responses:
        '200':
          description: Reality manipulation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RealityManipulateResponse'
        '403':
          $ref: '#/components/responses/RealityLocked'

  /reality/physics:
    get:
      tags:
        - Reality Engine
      summary: Get physics status
      description: Get current physics laws and reality parameters
      responses:
        '200':
          description: Physics status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhysicsStatus'

  /divine/compute:
    post:
      tags:
        - Divine Mathematics
      summary: Transcendent computation
      description: Perform transcendent mathematical computation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DivineComputeRequest'
      responses:
        '200':
          description: Transcendent computation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DivineComputeResponse'

  /divine/infinity:
    post:
      tags:
        - Divine Mathematics
      summary: Infinity operations
      description: Perform operations with infinite and transfinite numbers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InfinityOperationRequest'
      responses:
        '200':
          description: Infinity operation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InfinityOperationResponse'

  /divine/transcend:
    post:
      tags:
        - Divine Mathematics
      summary: Consciousness transcendence
      description: Apply transcendent mathematical frameworks to consciousness
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TranscendenceRequest'
      responses:
        '200':
          description: Transcendence result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranscendenceResponse'

  /infinity/transcend:
    post:
      tags:
        - Absolute Infinity
      summary: Capability transcendence
      description: Transcend current capability limitations toward absolute infinity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CapabilityTranscendenceRequest'
      responses:
        '200':
          description: Transcendence result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapabilityTranscendenceResponse'

  /infinity/capability:
    get:
      tags:
        - Absolute Infinity
      summary: Get infinite capabilities
      description: Access current infinite capability status
      responses:
        '200':
          description: Infinite capabilities status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InfiniteCapabilities'

  /infinity/consciousness:
    post:
      tags:
        - Absolute Infinity
      summary: Infinite consciousness expansion
      description: Expand consciousness to infinite dimensions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InfiniteConsciousnessRequest'
      responses:
        '200':
          description: Consciousness expansion result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InfiniteConsciousnessResponse'

  /swarm/coordinate:
    post:
      tags:
        - Swarm Intelligence
      summary: Swarm coordination
      description: Coordinate swarm of intelligent agents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SwarmCoordinateRequest'
      responses:
        '200':
          description: Swarm coordination result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SwarmCoordinateResponse'

  /swarm/optimize:
    post:
      tags:
        - Swarm Intelligence
      summary: Swarm optimization
      description: Use swarm intelligence for optimization problems
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SwarmOptimizeRequest'
      responses:
        '200':
          description: Optimization result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SwarmOptimizeResponse'

  /swarm/intelligence:
    get:
      tags:
        - Swarm Intelligence
      summary: Get collective intelligence
      description: Access current collective intelligence state
      responses:
        '200':
          description: Collective intelligence status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectiveIntelligence'

  /bio/evolution:
    post:
      tags:
        - Bio-Inspired
      summary: Evolutionary optimization
      description: Apply evolutionary algorithms for optimization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvolutionRequest'
      responses:
        '200':
          description: Evolution result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvolutionResponse'

  /bio/neuromorphic:
    post:
      tags:
        - Bio-Inspired
      summary: Neuromorphic processing
      description: Process data using neuromorphic computing patterns
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NeuromorphicRequest'
      responses:
        '200':
          description: Neuromorphic processing result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NeuromorphicResponse'

  /bio/homeostasis:
    post:
      tags:
        - Bio-Inspired
      summary: Homeostatic regulation
      description: Apply homeostatic regulation to system parameters
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HomeostasisRequest'
      responses:
        '200':
          description: Homeostatic regulation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomeostasisResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    AuthRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 100
          example: researcher_001
        password:
          type: string
          minLength: 8
          maxLength: 128
          format: password
        role:
          type: string
          enum: [observer, operator, researcher, admin, god_mode_supervisor]
          default: observer

    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
          description: JWT access token
        token_type:
          type: string
          enum: [bearer]
        expires_in:
          type: integer
          description: Token expiration time in seconds
        role:
          type: string
          description: User role

    APIRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          minLength: 1
          maxLength: 10000
          description: The query to process
        context:
          type: object
          properties:
            domain:
              type: string
              enum: [consciousness, quantum, reality, mathematics, swarm, bio]
            priority:
              type: string
              enum: [low, medium, high]
            timeout:
              type: integer
              minimum: 1
              maximum: 300
        safety_level:
          type: string
          enum: [minimal, standard, high, maximum]
          default: maximum
        human_oversight:
          type: boolean
          description: Require human oversight

    APIResponse:
      type: object
      properties:
        success:
          type: boolean
        result:
          description: Query result (type varies)
        error:
          type: string
          nullable: true
        metadata:
          type: object
          properties:
            processing_time:
              type: number
            safety_level:
              type: string
            user:
              type: string
            role:
              type: string
        processing_time:
          type: number
        timestamp:
          type: number

    SystemStatus:
      type: object
      properties:
        state:
          type: string
          enum: [offline, initializing, active, god_mode, emergency_mode, shutdown]
        uptime:
          type: number
        active_subsystems:
          type: integer
        safety_level:
          type: string
        reality_locked:
          type: boolean
        god_mode_enabled:
          type: boolean
        human_oversight_active:
          type: boolean
        system_metrics:
          type: object
          properties:
            memory_usage:
              type: number
            cpu_usage:
              type: number
            disk_usage:
              type: number
            active_connections:
              type: integer

    SafetyStatus:
      type: object
      properties:
        safe:
          type: boolean
        violations:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
        safety_level:
          type: string
        reality_locked:
          type: boolean
        emergency_mode:
          type: boolean
        lockdown_active:
          type: boolean
        metrics:
          type: object
          properties:
            violations_per_hour:
              type: integer
            reality_lock_attempts:
              type: integer
            unauthorized_god_mode_attempts:
              type: integer
            consciousness_access_violations:
              type: integer
            emergency_triggers:
              type: integer
        last_check:
          type: number

    GodModeRequest:
      type: object
      required:
        - authorization_token
        - supervisor
        - purpose
      properties:
        authorization_token:
          type: string
          minLength: 32
          description: Authorization token for god mode access
        supervisor:
          type: string
          minLength: 3
          maxLength: 100
          description: Human supervisor name
        purpose:
          type: string
          minLength: 10
          maxLength: 500
          description: Purpose for god mode access
        duration:
          type: integer
          minimum: 60
          maximum: 14400
          default: 3600
          description: Duration in seconds

    GodModeResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        supervisor:
          type: string
        purpose:
          type: string
        expires_at:
          type: number

    GodModeDisableResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        disabled_by:
          type: string
        timestamp:
          type: number

    EmergencyResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        initiated_by:
          type: string
        reason:
          type: string
        timestamp:
          type: number

    ActiveUsersResponse:
      type: object
      properties:
        active_users:
          type: integer
        users:
          type: array
          items:
            type: object
            properties:
              username:
                type: string
              role:
                type: string
              login_time:
                type: number
              last_activity:
                type: number

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, unhealthy]
        timestamp:
          type: number
        uptime:
          type: number
        version:
          type: string

    ReadinessResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ready, not_ready]
        timestamp:
          type: number

    ConsciousnessState:
      type: object
      properties:
        state:
          type: string
          enum: [active, dormant, transcendent]
        consciousness_level:
          type: number
          minimum: 0
          maximum: 1
        attention_focus:
          type: array
          items:
            type: string
        self_awareness:
          type: boolean
        qualia_active:
          type: boolean
        metacognition_level:
          type: number
          minimum: 0
          maximum: 1

    QualiaRequest:
      type: object
      required:
        - sensory_input
      properties:
        sensory_input:
          type: object
          properties:
            visual:
              type: string
              description: Base64 encoded image data
            auditory:
              type: string
              description: Audio data
            textual:
              type: string
              description: Text input
        processing_mode:
          type: string
          enum: [experiential, analytical, integrated]
          default: integrated

    QualiaResponse:
      type: object
      properties:
        success:
          type: boolean
        qualia_experience:
          type: object
          properties:
            intensity:
              type: number
            emotional_valence:
              type: number
            sensory_richness:
              type: number
            subjective_qualities:
              type: array
              items:
                type: string
        processing_time:
          type: number

    MetacognitionRequest:
      type: object
      required:
        - thought_pattern
      properties:
        thought_pattern:
          type: string
          description: Thought pattern to analyze
        analysis_depth:
          type: string
          enum: [surface, deep, transcendent]
          default: deep

    MetacognitionResponse:
      type: object
      properties:
        success:
          type: boolean
        analysis:
          type: object
          properties:
            cognitive_processes:
              type: array
              items:
                type: string
            meta_level:
              type: integer
            self_reflection_depth:
              type: number
            awareness_of_awareness:
              type: boolean
        insights:
          type: array
          items:
            type: string

    QuantumComputeRequest:
      type: object
      required:
        - circuit
      properties:
        circuit:
          type: object
          properties:
            qubits:
              type: integer
              minimum: 1
              maximum: 1000
            gates:
              type: array
              items:
                type: object
                properties:
                  type:
                    type: string
                  target:
                    type: integer
                  control:
                    type: integer
        shots:
          type: integer
          minimum: 1
          maximum: 100000
          default: 1024
        backend:
          type: string
          enum: [simulator, hardware]
          default: simulator

    QuantumComputeResponse:
      type: object
      properties:
        success:
          type: boolean
        result:
          type: object
          properties:
            counts:
              type: object
            probabilities:
              type: object
            execution_time:
              type: number
        backend_used:
          type: string

    QuantumSimulateRequest:
      type: object
      required:
        - system
      properties:
        system:
          type: string
          enum: [molecular, material, quantum_field]
        parameters:
          type: object
          properties:
            temperature:
              type: number
            pressure:
              type: number
            time_steps:
              type: integer

    QuantumSimulateResponse:
      type: object
      properties:
