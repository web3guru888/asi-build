# Promtail Configuration for Log Collection
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ASI-Code application logs
  - job_name: asi-code-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: asi-code
          service: asi-code
          environment: production
          __path__: /var/log/asi-code/*.log

    pipeline_stages:
      # Parse JSON logs
      - json:
          expressions:
            timestamp: timestamp
            level: level
            message: message
            service: service
            component: component
            session_id: session_id
            user_id: user_id
            request_id: request_id
            error: error

      # Set timestamp
      - timestamp:
          source: timestamp
          format: RFC3339

      # Set log level
      - labels:
          level:
          service:
          component:

      # Drop debug logs in production
      - drop:
          source: level
          expression: "debug"

      # Extract request information
      - regex:
          source: message
          expression: "(?P<method>GET|POST|PUT|DELETE|PATCH) (?P<path>/[^ ]*) HTTP/[0-9.]+ (?P<status>[0-9]+)"

      # Add extracted labels
      - labels:
          method:
          path:
          status:

  # NGINX access logs
  - job_name: nginx-access
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          service: nginx
          log_type: access
          __path__: /var/log/nginx/access.log

    pipeline_stages:
      # Parse NGINX access log format
      - regex:
          expression: '^(?P<remote_addr>[^ ]+) - (?P<remote_user>[^ ]+) \[(?P<time_local>[^\]]+)\] "(?P<method>[^ ]+) (?P<request>[^ ]+) (?P<protocol>[^ ]+)" (?P<status>[^ ]+) (?P<body_bytes_sent>[^ ]+) "(?P<http_referer>[^"]*)" "(?P<http_user_agent>[^"]*)"'

      # Parse timestamp
      - timestamp:
          source: time_local
          format: "02/Jan/2006:15:04:05 -0700"

      # Add labels
      - labels:
          method:
          status:
          remote_addr:

      # Drop health check requests
      - drop:
          source: request
          expression: "/health|/ready"

  # NGINX error logs
  - job_name: nginx-error
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          service: nginx
          log_type: error
          __path__: /var/log/nginx/error.log

    pipeline_stages:
      # Parse NGINX error log
      - regex:
          expression: '^(?P<timestamp>[^ ]+ [^ ]+) \[(?P<level>[^\]]+)\] (?P<pid>[^#]+)#(?P<tid>[^:]+): (?P<message>.*)'

      # Parse timestamp
      - timestamp:
          source: timestamp
          format: "2006/01/02 15:04:05"

      # Add level label
      - labels:
          level:

  # PostgreSQL logs
  - job_name: postgresql
    static_configs:
      - targets:
          - localhost
        labels:
          job: postgresql
          service: postgresql
          __path__: /var/log/postgresql/*.log

    pipeline_stages:
      # Parse PostgreSQL log format
      - regex:
          expression: '^(?P<timestamp>[^ ]+ [^ ]+) [^ ]+ \[(?P<pid>[^\]]+)\] (?P<level>[^:]+): (?P<message>.*)'

      # Parse timestamp
      - timestamp:
          source: timestamp
          format: "2006-01-02 15:04:05.000 MST"

      # Add labels
      - labels:
          level:
          pid:

      # Extract SQL statements
      - regex:
          source: message
          expression: "statement: (?P<sql>.*)"

      # Add SQL label if found
      - labels:
          sql_type:

  # Redis logs
  - job_name: redis
    static_configs:
      - targets:
          - localhost
        labels:
          job: redis
          service: redis
          __path__: /var/log/redis/*.log

    pipeline_stages:
      # Parse Redis log format
      - regex:
          expression: '^(?P<pid>[^:]+):(?P<role>[^ ]+) (?P<timestamp>[^ ]+ [^ ]+) (?P<level>[^ ]+) (?P<message>.*)'

      # Parse timestamp
      - timestamp:
          source: timestamp
          format: "02 Jan 15:04:05.000"

      # Add labels
      - labels:
          level:
          role:

  # Kubernetes pod logs (if running in Kubernetes)
  - job_name: kubernetes-pods
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - asi-code
    relabel_configs:
      - source_labels:
          - __meta_kubernetes_pod_annotation_prometheus_io_scrape
        action: keep
        regex: true
      - source_labels:
          - __meta_kubernetes_pod_container_name
        target_label: container
      - source_labels:
          - __meta_kubernetes_pod_name
        target_label: pod
      - source_labels:
          - __meta_kubernetes_namespace
        target_label: namespace
      - source_labels:
          - __meta_kubernetes_pod_label_app
        target_label: app
      - replacement: /var/log/pods/*$1/*.log
        separator: /
        source_labels:
          - __meta_kubernetes_pod_uid
          - __meta_kubernetes_pod_container_name
        target_label: __path__

    pipeline_stages:
      # Parse Kubernetes log format
      - cri: {}

      # Extract JSON from container logs
      - json:
          expressions:
            level: level
            message: message
            timestamp: timestamp

      # Set labels from extracted fields
      - labels:
          level:

# Limits
limits_config:
  readline_rate: 10000
  readline_burst: 20000