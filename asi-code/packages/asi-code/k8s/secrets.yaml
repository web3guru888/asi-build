# ASI-Code Secrets - Template (DO NOT commit with real values)
apiVersion: v1
kind: Secret
metadata:
  name: asi-code-secrets
  namespace: asi-code
  labels:
    app: asi-code
    component: secrets
type: Opaque
stringData:
  # API Keys (base64 encode in production)
  ANTHROPIC_API_KEY: "your-anthropic-api-key-here"
  OPENAI_API_KEY: "your-openai-api-key-here"
  
  # JWT Configuration
  JWT_SECRET: "your-jwt-secret-key-here"
  JWT_ALGORITHM: "HS256"
  
  # Database Configuration
  DATABASE_URL: "postgresql://asicode:password@asi-code-postgres:5432/asicode"
  POSTGRES_PASSWORD: "your-postgres-password-here"
  
  # Redis Configuration
  REDIS_URL: "redis://asi-code-redis:6379"
  REDIS_PASSWORD: "your-redis-password-here"
  
  # Encryption Keys
  ENCRYPTION_KEY: "your-32-byte-encryption-key-here"
  
  # Monitoring
  GRAFANA_PASSWORD: "your-grafana-password-here"
  
---
# TLS Secret for HTTPS
apiVersion: v1
kind: Secret
metadata:
  name: asi-code-tls
  namespace: asi-code
  labels:
    app: asi-code
    component: tls
type: kubernetes.io/tls
data:
  # Replace with your actual certificate and key (base64 encoded)
  tls.crt: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0t...
  tls.key: LS0tLS1CRUdJTiBQUklWQVRFIEtFWS0tLS0t...

---
# Docker Registry Secret (if using private registry)
apiVersion: v1
kind: Secret
metadata:
  name: asi-code-registry
  namespace: asi-code
  labels:
    app: asi-code
    component: registry
