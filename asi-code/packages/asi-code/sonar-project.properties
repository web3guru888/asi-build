# SonarQube Configuration for ASI-Code
sonar.projectKey=asi-code
sonar.projectName=ASI-Code Framework
sonar.projectVersion=0.2.0

# Source and Test Configuration
sonar.sources=src
sonar.tests=test
sonar.sourceEncoding=UTF-8

# TypeScript Configuration
sonar.typescript.node=node
sonar.typescript.tsconfigPath=tsconfig.json

# Coverage Configuration
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.test.ts,**/*.spec.ts,**/test/**,**/dist/**,**/node_modules/**

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.d.ts,**/*.min.js
sonar.test.exclusions=**/node_modules/**,**/dist/**

# Quality Gate Configuration
sonar.qualitygate.wait=true

# Code Analysis Configuration
sonar.javascript.environments=node,browser
sonar.typescript.excludeTypeLibraries=true

# Security Configuration
sonar.security.hotspots.inheritFromParent=true

# Duplication Configuration
sonar.cpd.exclusions=**/*.test.ts,**/*.spec.ts

# Issue Tracking
sonar.links.homepage=https://github.com/asi-team/asi-code
sonar.links.ci=https://github.com/asi-team/asi-code/actions
sonar.links.scm=https://github.com/asi-team/asi-code
sonar.links.issue=https://github.com/asi-team/asi-code/issues